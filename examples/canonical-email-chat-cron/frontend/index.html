<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ara Canonical Email Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Ara Session Chat UI</h1>
        <p>Canonical direct-runtime demo (frontend -> Ara API).</p>
      </section>

      <section class="card">
        <div class="grid">
          <div class="field">
            <label for="apiBase">Ara API Base</label>
            <input id="apiBase" />
          </div>
          <div class="field">
            <label for="appId">App ID</label>
            <input id="appId" placeholder="app_..." />
          </div>
          <div class="field">
            <label for="runtimeKey">Runtime Key</label>
            <input id="runtimeKey" placeholder="ak_app_..." />
          </div>
          <div class="field">
            <label for="agentId">Agent ID</label>
            <input id="agentId" />
          </div>
          <div class="field full">
            <label for="extraInput">Extra Input JSON (merged into input)</label>
            <textarea id="extraInput" rows="4" placeholder='{"tenant_id":"acme","source":"web"}'></textarea>
          </div>
        </div>
        <div class="row config-actions">
          <button id="saveConfig">Save Config</button>
          <div id="status" class="status"></div>
        </div>
      </section>

      <section class="card">
        <div id="messages"></div>
        <form id="chatForm" class="composer">
          <input id="messageInput" placeholder="Type a message..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
